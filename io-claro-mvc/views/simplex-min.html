<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simplex Minimizado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/styles.css"/>
</head>
<body>

  <nav class="navbar px-4 py-3 d-flex justify-content-between align-items-center">
    <a href="../index.html" class="text-decoration-none small" style="color:#64748b;">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
    <span class="fw-bold" style="color:#2563eb;">
      <i class="bi bi-graph-down-arrow me-2"></i>Simplex Minimizado
    </span>
    <span style="width:60px;"></span>
  </nav>

  <div class="container py-4" style="max-width:680px;">

    <h2 class="fw-bold mb-1">Simplex Minimizado</h2>
    <p class="subtitulo mb-4">Ingresa los datos del problema</p>

    <!-- Configuración -->
    <div class="card-seccion">
      <h5><i class="bi bi-sliders me-2"></i>Configuración</h5>
      <div class="row g-3">
        <div class="col-6">
          <label class="form-label small">Variables</label>
          <select class="form-select form-select-sm focus-min" id="numVars">
            <option value="2">2 variables</option>
            <option value="3">3 variables</option>
            <option value="4">4 variables</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label small">Restricciones</label>
          <select class="form-select form-select-sm focus-min" id="numRes">
            <option value="2">2 restricciones</option>
            <option value="3">3 restricciones</option>
            <option value="4">4 restricciones</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Función objetivo -->
    <div class="card-seccion">
      <h5><i class="bi bi-function me-2"></i>Función Objetivo — Min Z</h5>
      <div id="funcionObjetivo" class="d-flex align-items-center gap-2 flex-wrap">
        <!-- Generado por simplexMinView.js -->
      </div>
    </div>

    <!-- Restricciones -->
    <div class="card-seccion">
      <h5><i class="bi bi-list-check me-2"></i>Restricciones</h5>
      <div id="restricciones">
        <!-- Generado por simplexMinView.js -->
      </div>
    </div>

    <!-- Botones -->
    <div class="d-grid gap-2 mb-3">
      <button class="btn-resolver btn-min" id="btnResolver" disabled>
        <i class="bi bi-play-fill me-2"></i>Resolver
      </button>
      <button class="btn btn-outline-secondary btn-sm" id="btnLimpiar">
        <i class="bi bi-arrow-counterclockwise me-1"></i>Limpiar
      </button>
    </div>

    <!-- Resultado placeholder -->
    <div class="card-seccion" id="resultadoBox" style="opacity:0.4;">
      <h5><i class="bi bi-award me-2"></i>Resultado</h5>
      <p class="mb-0 small" style="color:#64748b;">El resultado aparecerá aquí.</p>
    </div>

  </div>

  <footer>Investigación de Operaciones · Grupo #3 · 2025</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../models/simplexModel.js"></script>
  <script src="../controllers/simplexController.js"></script>
  <script src="../assets/js/simplexMinView.js"></script>
</body>
</html>
