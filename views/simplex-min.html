<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simplex Minimizado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/styles.css"/>
</head>
<body>

  <nav class="navbar px-4 py-3 d-flex justify-content-between align-items-center">
    <a href="../index.html" class="text-decoration-none small" style="color:#64748b;">
      <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
    <span class="fw-bold" style="color:var(--color-interaccion-hover);">
      <i class="bi bi-graph-down-arrow me-2"></i>Simplex Minimizado
    </span>
    <span style="width:60px;"></span>
  </nav>

  <div class="container py-4" style="max-width:720px;">

    <h2 class="fw-bold mb-1">Simplex Minimizado</h2>
    <p class="subtitulo mb-4">Ingresa los datos del problema</p>

    <!-- Configuración -->
    <div class="card-seccion">
      <h5><i class="bi bi-sliders me-2"></i>Configuración</h5>
      <div class="row g-3 align-items-start">
        <div class="col-6">
          <label class="form-label small">Variables</label>
          <input type="number" class="form-control form-control-sm focus-min config-num-input"
                 id="numVars" value="2" min="2" max="10"/>
          <div class="config-hint">Mínimo 2 · Máximo 10</div>
        </div>
        <div class="col-6">
          <label class="form-label small">Restricciones</label>
          <input type="number" class="form-control form-control-sm focus-min config-num-input"
                 id="numRes" value="2" min="1" max="15"/>
          <div class="config-hint">Mínimo 1 · Máximo 15</div>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-sm focus-min" id="btnAplicar"
                style="background:var(--color-interaccion);border:none;border-radius:8px;font-weight:600;padding:6px 18px;">
          <i class="bi bi-check2 me-1"></i>Aplicar configuración
        </button>
        <span id="configError" class="ms-2 small text-danger" style="display:none;"></span>
      </div>
    </div>

    <!-- Función objetivo -->
    <div class="card-seccion">
      <h5><i class="bi bi-function me-2"></i>Función Objetivo — Min Z</h5>
      <div id="funcionObjetivo" class="d-flex align-items-center gap-2 flex-wrap">
        <!-- Generado por simplexMinView.js -->
      </div>
    </div>

    <!-- Restricciones -->
    <div class="card-seccion">
      <h5><i class="bi bi-list-check me-2"></i>Restricciones</h5>
      <div id="restricciones">
        <!-- Generado por simplexMinView.js -->
      </div>
    </div>

    <!-- Botones -->
    <div class="d-grid gap-2 mb-3">
      <button class="btn-resolver btn-min" id="btnResolver" disabled>
        <i class="bi bi-play-fill me-2"></i>Calcular
      </button>
      <button class="btn btn-outline-secondary btn-sm" id="btnLimpiar">
        <i class="bi bi-arrow-counterclockwise me-1"></i>Limpiar campos
      </button>
    </div>

    <!-- Spinner -->
    <div class="spinner-overlay" id="spinnerBox">
      <div class="spinner-ring min"></div>
      <span>Calculando solución óptima…</span>
    </div>

    <!-- Resultado -->
    <div class="card-seccion" id="resultadoBox" style="opacity:0.4;">
      <h5><i class="bi bi-award me-2" style="color:var(--color-exito);filter:brightness(0.75);"></i>Resultado</h5>
      <p class="mb-0 small" style="color:#64748b;">El resultado aparecerá aquí.</p>
    </div>

  </div>

  <footer>Investigación de Operaciones · Grupo #3 · 2026</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../models/simplexBaseModel.js"></script>
  <script src="../models/simplexMaxModel.js"></script>
  <script src="../models/simplexMinModel.js"></script>
  <script src="../models/simplexModel.js"></script>
  <script src="../controllers/simplexController.js"></script>
  <script src="../assets/js/simplexMinView.js"></script>
</body>
</html>
